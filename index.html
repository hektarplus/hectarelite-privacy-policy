<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Privacy Policy - ACRE+ | TOPGNSS</title>
    <script>
        // Определяем язык браузера и перенаправляем на соответствующую версию
        const language = navigator.language || navigator.userLanguage;
        const langCode = language.split('-')[0].toLowerCase();
        
        let redirectUrl = "PRIVACY_POLICY_EN.html"; // По умолчанию английская
        
        if (langCode === "ru") {
            redirectUrl = "PRIVACY_POLICY.html"; // Русская версия
        } else if (langCode === "uk") {
            redirectUrl = "PRIVACY_POLICY_UK.html"; // Украинская версия
        } else if (langCode === "en") {
            redirectUrl = "PRIVACY_POLICY_EN.html"; // Английская версия
        } else if (langCode === "de" || langCode === "pl") {
            // Для немецкого и польского используем английскую версию
            redirectUrl = "PRIVACY_POLICY_EN.html";
        }
        
        window.location.href = redirectUrl;
    </script>
</head>
<body>
    <p>If you were not redirected automatically, please select your language:</p>
    <ul>
        <li><a href="PRIVACY_POLICY.html">Русский (Russian)</a></li>
        <li><a href="PRIVACY_POLICY_UK.html">Українська (Ukrainian)</a></li>
        <li><a href="PRIVACY_POLICY_EN.html">English</a></li>
    </ul>
</body>
</html>
